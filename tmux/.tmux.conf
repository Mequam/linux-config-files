#VIM MODE
setw -g mode-keys vi

#custom prefix key
unbind C-b
set-option -g prefix "C-f"
bind-key "C-f" send-prefix


#easy reload key
bind r source-file ~/.tmux.conf



# switch panes using Alt-arrow without prefix
bind -n M-Left resize-pane -L
bind -n M-Right resize-pane -R

bind -n M-Up resize-pane -U
bind -n M-Down resize-pane -D


#mouse mode for the unitiated
#set -g mouse on

# clock mode
setw -g clock-mode-colour cyan

# copy mode
setw -g mode-style 'fg=black bg=cyan bold'

# panes
set -g pane-border-style 'fg=cyan'
set -g pane-active-border-style 'fg=cyan'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=cyan'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=cyan'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=cyan'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=cyan bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=cyan]#F '

setw -g window-status-bell-style 'fg=cyan bg=cyan bold'

# messages
set -g message-style 'fg=black bg=cyan'

#global keybind
bind-key -n C-t new-window -c "#{pane_current_path}"
unbind C-w
bind-key -n C-q kill-window
bind-key -n C-Tab next-window
bind-key -n C-x kill-pane

#command keybinds
bind-key Tab next-window
bind-key s split-window -c "#{pane_current_path}"
bind-key S split-window -f -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"
bind-key V split-window -hf -c "#{pane_current_path}"
bind-key a new-session


#nvim motion
bind -T copy-mode-vi v send -X begin-selection
#bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
#bind P paste-buffer
#bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'sainnhe/tmux-fzf'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
