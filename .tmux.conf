#VIM MODE
setw -g mode-keys vi

#custom prefix key
unbind C-b
set-option -g prefix "C-f"
bind-key "C-f" send-prefix


#easy reload key
bind r source-file ~/.tmux.conf



# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

#mouse mode for the unitiated
#set -g mouse on

# clock mode
setw -g clock-mode-colour red

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=red'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=red'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=red]#F '

setw -g window-status-bell-style 'fg=red bg=red bold'

# messages
set -g message-style 'fg=black bg=red'

#global keybind
bind-key -n C-t new-window
unbind C-w
bind-key -n C-q kill-window
bind-key -n C-Tab next-window
bind-key -n C-x kill-pane

#command keybinds
bind-key Tab next-window
bind-key s split-window
bind-key S split-window -f
bind-key v split-window -h
bind-key V split-window -hf
bind-key a new-session


#nvim motion
bind -T copy-mode-vi v send -X begin-selection
#bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
#bind P paste-buffer
#bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
